name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-24.04
    outputs:
      published: ${{ steps.version.outputs.published }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Match tag to Cargo version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          if [[ -z "$version" || "$GITHUB_REF_NAME" != "v$version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match Cargo.toml version $version" >&2
            exit 1
          fi

          published=false
          if gh api \
            "repos/$GITHUB_REPOSITORY/releases/tags/$GITHUB_REF_NAME" \
            --silent >/dev/null 2>&1; then
            published=true
            echo "Release $GITHUB_REF_NAME is already published; nothing to rebuild." \
              >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "published=$published" >> "$GITHUB_OUTPUT"

  packages:
    name: Build packages
    needs: validate
    if: needs.validate.outputs.published != 'true'
    uses: ./.github/workflows/packages.yml

  publish:
    name: Publish GitHub release
    needs: [validate, packages]
    if: needs.validate.outputs.published != 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          pattern: ipmicfg-*
          path: dist
          merge-multiple: true

      - name: Create checksums
        working-directory: dist
        run: sha256sum ./* > SHA256SUMS

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" dist/* \
              --verify-tag \
              --generate-notes \
              --title "ipmicfg $VERSION" \
              --repo "$GITHUB_REPOSITORY"
          fi
