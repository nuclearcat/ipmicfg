name: Packages

on:
  pull_request:
    paths:
      - ".github/workflows/packages.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "README.md"
      - "src/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/packages.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "README.md"
      - "src/**"
  workflow_call:
    inputs:
      force_build:
        description: Build even when this version is already published
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      force_build:
        description: Build even when this version is already published
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  preflight:
    name: Check package version
    runs-on: ubuntu-24.04
    outputs:
      build: ${{ steps.decision.outputs.build }}
      version: ${{ steps.decision.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether packages are needed
        id: decision
        env:
          BEFORE_SHA: ${{ github.event.before }}
          FORCE_BUILD: ${{ inputs.force_build }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          if [[ -z "$version" ]]; then
            echo "Could not read the package version from Cargo.toml" >&2
            exit 1
          fi

          version_changed=true
          if [[ "$GITHUB_EVENT_NAME" == "push" \
                && -n "$BEFORE_SHA" \
                && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            previous_version="$(
              git show "${BEFORE_SHA}:Cargo.toml" 2>/dev/null \
                | sed -n 's/^version = "\([^"]*\)"/\1/p' \
                | head -n 1
            )"
            if [[ "$previous_version" == "$version" ]]; then
              version_changed=false
            fi
          elif [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            version_changed=false
          fi

          published=false
          if gh api \
            "repos/$GITHUB_REPOSITORY/releases/tags/v$version" \
            --silent >/dev/null 2>&1; then
            published=true
          fi

          build=true
          reason="package validation is required"
          if [[ "$FORCE_BUILD" == "true" ]]; then
            reason="a forced build was requested"
          elif [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            reason="pull requests always validate packaging"
          elif [[ "$version_changed" == "false" && "$published" == "true" ]]; then
            build=false
            reason="v$version is unchanged and already published"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "build=$build" >> "$GITHUB_OUTPUT"
          echo "Package version: $version" >> "$GITHUB_STEP_SUMMARY"
          echo "Version changed: $version_changed" >> "$GITHUB_STEP_SUMMARY"
          echo "Already published: $published" >> "$GITHUB_STEP_SUMMARY"
          echo "Decision: $reason" >> "$GITHUB_STEP_SUMMARY"

  deb:
    name: Ubuntu ${{ matrix.ubuntu }} .deb (x86_64)
    needs: preflight
    if: needs.preflight.outputs.build == 'true'
    runs-on: ubuntu-24.04
    container: ubuntu:${{ matrix.ubuntu }}
    strategy:
      fail-fast: false
      matrix:
        ubuntu: ["24.04", "26.04"]

    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install --yes --no-install-recommends \
            build-essential ca-certificates curl pkg-config xz-utils

      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 --silent --show-error --fail \
            https://sh.rustup.rs | sh -s -- --profile minimal --default-toolchain stable -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Test
        run: cargo test --locked

      - name: Build Debian package
        run: |
          cargo install --locked cargo-deb --version 3.7.0
          cargo deb

      - name: Inspect Debian package
        run: |
          dpkg-deb --info target/debian/*.deb
          dpkg-deb --contents target/debian/*.deb
          mkdir package-root
          dpkg-deb --extract target/debian/*.deb package-root
          package-root/usr/bin/ipmicfg --version

      - name: Add Ubuntu version to package filename
        shell: bash
        run: |
          package=(target/debian/*_amd64.deb)
          if [[ "${#package[@]}" -ne 1 || ! -f "${package[0]}" ]]; then
            echo "Expected exactly one amd64 Debian package" >&2
            exit 1
          fi
          mv -- "${package[0]}" \
            "${package[0]%_amd64.deb}_ubuntu${{ matrix.ubuntu }}_amd64.deb"

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: ipmicfg-deb-ubuntu-${{ matrix.ubuntu }}
          path: target/debian/*.deb
          if-no-files-found: error

  rpm:
    name: Fedora 44 .rpm (x86_64)
    needs: preflight
    if: needs.preflight.outputs.build == 'true'
    runs-on: ubuntu-24.04
    container: fedora:44

    steps:
      - name: Install build dependencies
        run: |
          dnf install --assumeyes \
            binutils ca-certificates curl gcc make pkgconf-pkg-config rpm-build

      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 --silent --show-error --fail \
            https://sh.rustup.rs | sh -s -- --profile minimal --default-toolchain stable -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Test
        run: cargo test --locked

      - name: Build RPM package
        run: |
          cargo install --locked cargo-generate-rpm --version 0.21.0
          cargo build --release --locked
          strip target/release/ipmicfg
          cargo generate-rpm

      - name: Inspect RPM package
        run: |
          rpm --query --package --info target/generate-rpm/*.rpm
          rpm --query --package --list target/generate-rpm/*.rpm
          rpm --query --package --requires target/generate-rpm/*.rpm

      - name: Upload RPM package
        uses: actions/upload-artifact@v4
        with:
          name: ipmicfg-rpm-fedora-44
          path: target/generate-rpm/*.rpm
          if-no-files-found: error
